<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>생태 스피드 퀴즈!</title>
    <!-- 구글 폰트 적용 (동글동글한 Jua 글씨체) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        /* 기본적으로 한글 어절이 중간에 끊기지 않도록 설정 */
        * { word-break: keep-all; box-sizing: border-box; }
        
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #e8f5e9; font-family: 'Jua', sans-serif; overflow: hidden; user-select: none; }
        
        /* 상단 로고 및 제목 여백을 줄여 사진 영역 확보 */
        .logo { height: 50px; margin-top: 5px; margin-bottom: 5px; object-fit: contain; }
        h1 { color: #2e7d32; margin-top: 0; margin-bottom: 10px; font-size: 3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); text-align: center; line-height: 1.1; }
        
        /* 사진 영역을 화면에 꽉 차게 (max-width: 1400px, height: 60vh로 대폭 확대) */
        #image-container { width: 96vw; max-width: 1400px; height: 60vh; background-color: white; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 6px solid #fff; }
        #quiz-image { max-width: 100%; max-height: 100%; object-fit: contain; display: none; margin: auto; }
        
        /* 타이머, 상태바, 컨트롤 버튼도 넓은 화면에 맞춰 확장 */
        #timer-container { width: 96vw; max-width: 1400px; height: 30px; background-color: #c8e6c9; margin-top: 15px; border-radius: 15px; overflow: hidden; border: 3px solid #a5d6a7; }
        #timer-bar { width: 100%; height: 100%; background-color: #4caf50; transition: width 0.1s linear, background-color 0.5s; }
        
        #answer-text { font-size: 5.5rem; color: #d32f2f; margin-top: 10px; visibility: hidden; height: 65px; text-shadow: 3px 3px 0 #fff; line-height: 1; text-align: center; }
        
        #info-bar { width: 96vw; max-width: 1400px; display: none; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 15px; }
        #stage-text { color: #558b2f; margin: 0; font-size: 2rem; display: none; text-align: center; }
        #info-team { font-size: 1.8rem; color: #1b5e20; background: #c8e6c9; padding: 10px 25px; border-radius: 10px; box-shadow: 0 3px 0 #a5d6a7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 350px; }
        #info-score { font-size: 1.8rem; color: #c62828; background: #ffcdd2; padding: 10px 25px; border-radius: 10px; box-shadow: 0 3px 0 #ef9a9a; white-space: nowrap; }
        
        /* OX 마크 크기 조절 */
        #ox-overlay { position: absolute; font-size: min(35vw, 35vh); z-index: 20; display: none; text-shadow: 0 0 50px rgba(255,255,255,1); pointer-events: none; }
        .ox-o { color: #1976d2; }
        .ox-x { color: #d32f2f; }

        /* 시작 설정 화면 */
        #setup-area { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; padding: 20px; width: 100%; max-height: 100%; overflow-y: auto; margin: auto 0; }
        .input-group { background-color: #f1f8e9; padding: 15px 25px; border-radius: 12px; border: 3px solid #a5d6a7; display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 1.4rem; color: #2e7d32; width: 100%; max-width: 700px; flex-wrap: wrap; }
        .input-group label { font-weight: bold; }
        .input-group input[type="text"], .input-group input[type="number"] { font-family: 'Jua', sans-serif; font-size: 1.3rem; padding: 8px 15px; width: 140px; text-align: center; border: 3px solid #81c784; border-radius: 8px; outline: none; }
        .input-group input:focus { border-color: #2e7d32; }
        
        /* 테마 선택 버튼 디자인 */
        .theme-selector { display: flex; gap: 10px; flex-wrap: nowrap; justify-content: center; width: 100%; }
        .theme-btn { font-family: 'Jua', sans-serif; padding: 10px 15px; font-size: 1.3rem; border: 3px solid #bdbdbd; border-radius: 20px; background-color: #e0e0e0; color: #757575; cursor: pointer; transition: 0.2s; white-space: nowrap; box-shadow: none; opacity: 0.7; flex: 1; text-align: center; }
        .theme-btn.active { background-color: #4caf50; color: #fff; border-color: #388e3c; box-shadow: 0 4px 0 #2e7d32; transform: translateY(-2px); opacity: 1; }
        
        /* 선택된 테마 텍스트 표시 영역 */
        #selected-theme-display { font-size: 1.4rem; margin-top: 5px; font-weight: normal; padding: 6px 18px; border-radius: 10px; transition: 0.3s; }

        .setup-btns { display: flex; gap: 15px; justify-content: center; margin-top: 5px; width: 100%; max-width: 700px; }
        .btn-blue { background-color: #1976d2; box-shadow: 0 5px 0 #0d47a1; }
        .btn-blue:hover { background-color: #1565c0; box-shadow: 0 3px 0 #0d47a1; }
        .btn-orange { background-color: #f57c00; box-shadow: 0 5px 0 #e65100; }
        .btn-orange:hover { background-color: #ef6c00; box-shadow: 0 3px 0 #e65100; }
        
        /* 전체 문제 보기 모달 스타일 */
        #all-questions-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background-color: #e8f5e9; border-radius: 20px; width: 100%; max-width: 1400px; max-height: 90vh; padding: 30px; position: relative; display: flex; flex-direction: column; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 3.5rem; color: #2e7d32; cursor: pointer; line-height: 1; transition: 0.2s; }
        .close-btn:hover { color: #1b5e20; transform: scale(1.1); }
        #questions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; overflow-y: auto; padding-right: 15px; margin-top: 15px; }
        .q-card { background: #fff; border: 3px solid #a5d6a7; border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: flex-start; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .q-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; background-color: #f5f5f5; border: 1px solid #e0e0e0; }
        .q-card .ans-input { color: #d32f2f; font-weight: bold; font-size: 1.5rem; margin-bottom: 8px; text-align: center; border: 2px dashed #ef9a9a; border-radius: 6px; padding: 6px; width: 100%; font-family: 'Jua', sans-serif; transition: 0.2s; }
        .q-card .ans-input:focus { outline: none; border: 2px solid #d32f2f; background-color: #ffebee; }
        .q-card .img-url-input { font-size: 1rem; margin-bottom: 10px; text-align: center; border: 2px solid #c8e6c9; border-radius: 6px; padding: 6px; width: 100%; font-family: sans-serif; }
        .q-card .category-badge { display: inline-block; background: #c8e6c9; color: #1b5e20; font-size: 1rem; padding: 4px 10px; border-radius: 5px; margin-bottom: 8px; align-self: center; }
        .upload-label { display: inline-block; background-color: #4caf50; color: white; padding: 10px 12px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: auto; box-shadow: 0 3px 0 #388e3c; }
        .upload-label:hover { background-color: #388e3c; transform: translateY(2px); box-shadow: 0 1px 0 #2e7d32; }
        .upload-label input[type="file"] { display: none; }

        /* 점수 집계판 모달 스타일 */
        #scoreboard-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .score-list-container { max-height: 55vh; overflow-y: auto; margin-top: 30px; text-align: left; padding-right: 15px; }
        .score-item { display: flex; justify-content: space-between; font-size: 2.2rem; padding: 20px 15px; border-bottom: 3px dashed #a5d6a7; color: #1b5e20; align-items: center; gap: 10px; }
        .score-rank { font-weight: bold; min-width: 100px; font-size: 2.4rem; white-space: nowrap; }
        .score-name { flex-grow: 1; text-align: center; padding: 0 10px; }
        .score-points { font-weight: bold; color: #d32f2f; font-size: 2.4rem; min-width: 100px; text-align: right; white-space: nowrap; }

        /* 커스텀 모달 스타일 */
        #custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .custom-modal { background: #fff; padding: 40px 30px; border-radius: 20px; text-align: center; border: 5px solid #a5d6a7; width: 100%; max-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        #custom-modal-msg { font-size: 1.8rem; color: #2e7d32; margin-top: 0; margin-bottom: 30px; white-space: pre-wrap; line-height: 1.4; font-family: 'Jua', sans-serif; }
        .custom-modal-btns { display: flex; gap: 15px; justify-content: center; }
        .custom-modal-btns button { padding: 12px 25px; font-size: 1.5rem; border-radius: 10px; flex: 1; }
        #custom-btn-cancel { background-color: #757575; box-shadow: 0 5px 0 #424242; }
        #custom-btn-cancel:hover { background-color: #616161; box-shadow: 0 3px 0 #424242; }
        #custom-btn-cancel:active { transform: translateY(4px); box-shadow: 0 1px 0 #424242; }

        /* 하단 조작 컨트롤 */
        .controls { margin-top: 15px; display: flex; gap: 15px; width: 96vw; max-width: 1400px; justify-content: center; }
        button { font-family: 'Jua', sans-serif; padding: 18px 25px; font-size: 1.6rem; cursor: pointer; border: none; border-radius: 12px; color: white; background-color: #2e7d32; transition: 0.2s; box-shadow: 0 5px 0 #1b5e20; touch-action: manipulation; white-space: nowrap; }
        button:hover { background-color: #1b5e20; transform: translateY(2px); box-shadow: 0 3px 0 #1b5e20; }
        button:active { transform: translateY(5px); box-shadow: 0 0px 0 #1b5e20; }
        button:disabled { background-color: #a5d6a7; box-shadow: 0 5px 0 #81c784; cursor: not-allowed; opacity: 0.7; }
        
        #btn-o, #btn-x { flex: 1; }
        #answer-btn, #btn-stop { flex: 1; }

        .mobile-br { display: none; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #e8f5e9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #81c784; border-radius: 10px; border: 2px solid #e8f5e9; }

        /* 📱 모바일 디바이스 최적화 */
        @media (max-width: 768px) {
            .logo { height: 40px; margin-top: 5px; }
            h1 { font-size: 2rem; margin-bottom: 5px; }
            
            #info-bar { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 10px; margin-bottom: 10px; }
            #stage-text { grid-column: 1 / 3; grid-row: 1; font-size: 1.4rem; margin-bottom: 0; }
            #info-team { grid-column: 1; grid-row: 2; font-size: 1.2rem; padding: 8px 10px; max-width: none; }
            #info-score { grid-column: 2; grid-row: 2; font-size: 1.2rem; padding: 8px 10px; text-align: center; }
            
            /* 모바일에서도 사진 영역 최대한 확보 */
            #image-container { height: 45vh; border-width: 4px; border-radius: 15px; padding-bottom: 10px; }
            #ox-overlay { font-size: 12rem; align-self: center; }
            
            #timer-container { height: 20px; margin-top: 10px; }
            #answer-text { font-size: 3rem; margin-top: 5px; height: 45px; }
            
            #setup-area { padding: 15px 10px; gap: 12px; justify-content: flex-start; }
            .input-group { flex-direction: column; padding: 15px; gap: 10px; font-size: 1.3rem; }
            .input-group input[type="text"], .input-group input[type="number"] { width: 100%; max-width: none; font-size: 1.3rem; }
            
            .theme-selector { display: flex; flex-wrap: nowrap; justify-content: space-between; overflow-x: hidden; width: 100%; gap: 4px; padding-bottom: 0; }
            .theme-btn { font-size: 0.85rem; padding: 10px 0; width: 24%; flex: 1; letter-spacing: -0.5px; white-space: nowrap; word-break: keep-all; }
            #selected-theme-display { font-size: 1.1rem; padding: 5px 10px; }

            .setup-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
            .setup-btns button { width: 100%; font-size: 1.1rem; padding: 12px 5px; line-height: 1.4; white-space: normal; }
            
            .mobile-br { display: block; }
            .desktop-space { display: none; }
            
            .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
            button { width: 100%; padding: 12px 5px; font-size: 1.15rem; white-space: normal; line-height: 1.3; }
            #start-btn { grid-column: 1 / 3; padding: 15px 10px; font-size: 1.5rem; }
            
            .modal-content { padding: 15px; max-height: 90vh; }
            .close-btn { top: 10px; right: 15px; font-size: 2.5rem; }
            #all-questions-modal h2, #scoreboard-modal h2 { font-size: 1.6rem; }
            #questions-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
            .q-card { padding: 10px; }
            .q-card img { height: 90px; }
            .q-card .ans-input { font-size: 1.1rem; }
            
            .score-item { font-size: 1.3rem; padding: 15px 5px; }
            .score-rank, .score-points { font-size: 1.4rem; min-width: 60px; }
            
            #custom-modal-msg { font-size: 1.4rem; }
            .custom-modal-btns button { font-size: 1.2rem; padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <img src="50436.png" alt="국립장성숲체원 로고" class="logo">
    <h1>🌿 생태 스피드 퀴즈</h1>
    
    <div id="info-bar">
        <div id="info-team">팀: -</div>
        <h2 id="stage-text"></h2>
        <div id="info-score">점수: 0</div>
    </div>
    
    <!-- 화면에 꽉 차도록 확장된 이미지 컨테이너 -->
    <div id="image-container">
        <div id="ox-overlay"></div>
        <div id="setup-area">
            
            <div class="input-group" style="flex-direction: row; flex-wrap: wrap;">
                <label for="team-name">참가 팀명:</label>
                <input type="text" id="team-name" placeholder="생략 가능">
            </div>

            <div class="input-group" style="flex-direction: column; align-items: center; gap: 12px;">
                <label>퀴즈 테마 선택 (클릭하여 켜기/끄기)</label>
                <div class="theme-selector">
                    <button class="theme-btn" data-theme="동물(곤충)" onclick="toggleTheme('동물(곤충)', this)">🦁 동물(곤충)</button>
                    <button class="theme-btn" data-theme="식물(꽃)" onclick="toggleTheme('식물(꽃)', this)">🌿 식물(꽃)</button>
                    <button class="theme-btn" data-theme="나무(과일)" onclick="toggleTheme('나무(과일)', this)">🌲 나무(과일)</button>
                    <button class="theme-btn" data-theme="캐릭터" onclick="toggleTheme('캐릭터', this)">🧚 캐릭터</button>
                </div>
                <div id="selected-theme-display"></div>
            </div>

            <div class="input-group" style="flex-direction: row; flex-wrap: wrap;">
                <label for="question-count">진행 문제 수:</label>
                <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
                    <input type="number" id="question-count" min="1" value="0">
                    <span id="max-count-label" style="font-weight: bold; color: #1b5e20;"></span>
                </div>
            </div>

            <div class="setup-btns">
                <button onclick="toggleScoreboard()" class="btn-blue">🏆 팀별 점수<span class="desktop-space"> </span><br class="mobile-br">집계판</button>
                <button onclick="toggleAllQuestions()" class="btn-orange">👀 선택 문제<span class="desktop-space"> </span><br class="mobile-br">확인 및 수정</button>
            </div>
        </div>
        <img id="quiz-image" src="" alt="퀴즈 이미지">
    </div>

    <div id="timer-container">
        <div id="timer-bar"></div>
    </div>

    <div id="answer-text">정답!</div>

    <!-- 단축키 표시가 명확하게 반영된 컨트롤 영역 -->
    <div class="controls">
        <button id="start-btn" onclick="startQuiz()">▶️ 퀴즈 시작하기</button>
        <button id="btn-o" onclick="markAnswer(true)" style="background-color: #1976d2; display: none;">정답 O (←)</button>
        <button id="btn-x" onclick="markAnswer(false)" style="background-color: #e53935; display: none;">오답 X (→)</button>
        <button id="answer-btn" onclick="showAnswer()" disabled style="display: none;">정답 보기 (Space)</button>
        <button id="btn-stop" onclick="stopQuiz()" style="background-color: #616161; display: none;">그만하기 (ESC)</button>
    </div>

    <!-- 오디오 소스 -->
    <audio id="snd-tick" src="ticking.wav" preload="auto"></audio>
    <audio id="snd-ding" src="ding.wav" preload="auto"></audio>
    <audio id="snd-wrong" src="wrong.wav" preload="auto"></audio>

    <div id="custom-modal-overlay">
        <div class="custom-modal">
            <p id="custom-modal-msg"></p>
            <div class="custom-modal-btns">
                <button id="custom-btn-ok" style="background-color: #2e7d32; box-shadow: 0 5px 0 #1b5e20;">확인</button>
                <button id="custom-btn-cancel">취소</button>
            </div>
        </div>
    </div>

    <div id="all-questions-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleAllQuestions()">&times;</span>
            <h2 style="color: #2e7d32; margin-top: 0; border-bottom: 3px solid #a5d6a7; padding-bottom: 10px; margin-bottom: 10px; font-size: 2rem;">목록 (<span id="total-q-count">0</span>문제)</h2>
            <p style="color: #d32f2f; font-size: 1.1rem; margin: 0 0 10px 0;">⚠️ 임시 수정 모드입니다. 영구 반영하려면 깃허브 저장소를 수정하세요.</p>
            <div id="questions-grid"></div>
        </div>
    </div>

    <div id="scoreboard-modal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close-btn" onclick="toggleScoreboard()">&times;</span>
            <h2 style="color: #2e7d32; margin-top: 0; border-bottom: 3px solid #a5d6a7; padding-bottom: 15px; margin-bottom: 10px; text-align: center; font-size: 2.5rem;">🏆 명예의 전당</h2>
            <div class="score-list-container" id="score-list"></div>
        </div>
    </div>

    <script>
        // 💡 확장자(.jpg, .png)를 적지 않고 파일 이름만 적어도 자동으로 이미지를 불러옵니다.
        // 💡 새로운 문제는 A, B, C 포맷으로 30문항(101~130번) 추가되었습니다.
        const quizData = [
            { category: "동물(곤충)", answer: "다람쥐", img: "01" },
            { category: "동물(곤충)", answer: "청설모", img: "02" },
            { category: "동물(곤충)", answer: "멧돼지", img: "03" },
            { category: "동물(곤충)", answer: "고라니", img: "04" },
            { category: "동물(곤충)", answer: "딱따구리", img: "05" },
            { category: "동물(곤충)", answer: "부엉이", img: "06" },
            { category: "동물(곤충)", answer: "개구리", img: "07" },
            { category: "동물(곤충)", answer: "토끼", img: "08" },
            { category: "동물(곤충)", answer: "무당벌레", img: "09" },
            { category: "동물(곤충)", answer: "장수풍뎅이", img: "10" },
            { category: "동물(곤충)", answer: "사슴벌레", img: "11" },
            { category: "동물(곤충)", answer: "나비", img: "12" },
            { category: "동물(곤충)", answer: "매미", img: "13" },
            { category: "동물(곤충)", answer: "거북이", img: "14" },
            { category: "동물(곤충)", answer: "북극곰", img: "15" },
            { category: "동물(곤충)", answer: "코뿔소", img: "16" },

            const filteredData = quizData.filter(item => selectedThemes.includes(item.category));
            const maxVal = filteredData.length;
            
            questionCountInput.max = maxVal > 0 ? maxVal : 1; 
            
            if (maxVal === 0) {
                questionCountInput.value = 0;
            } else if (parseInt(questionCountInput.value) > maxVal || parseInt(questionCountInput.value) === 0 || isNaN(parseInt(questionCountInput.value))) {
                questionCountInput.value = maxVal > 20 ? 20 : maxVal; 
            }
            maxCountLabel.innerText = `/ 최대 ${maxVal}문제`;
        }

            if (selectedThemes.includes(themeName)) {
                selectedThemes = selectedThemes.filter(t => t !== themeName);
                btnElement.classList.remove('active');
            } else {
                selectedThemes.push(themeName);
                btnElement.classList.add('active');
            }
            updateMaxCount();
            updateThemeDisplay();
        }

        function renderAllQuestions() {
            questionsGrid.innerHTML = "";
            const filteredData = quizData.filter(item => selectedThemes.includes(item.category));
            totalQCount.innerText = filteredData.length;
            
            filteredData.forEach((item) => {
                const originalIndex = quizData.indexOf(item);
                const card = document.createElement('div');
                card.className = 'q-card';
                
                // 💡 확장자를 자동으로 인식 및 교체하는 안전한 폴백 로직 적용
                const hasExt = item.img.startsWith('blob:') || item.img.startsWith('http') || item.img.includes('.');
                const imgSrc = hasExt ? item.img : item.img + ".jpg";
                const onErr = hasExt 
                    ? "this.src='https://via.placeholder.com/150?text=이미지+없음'"
                    : `if(this.src.includes('.jpg')) this.src='${item.img}.png'; else this.src='https://via.placeholder.com/150?text=이미지+없음';`;

                card.innerHTML = `
                    <div class="category-badge">${item.category}</div>
                    <img id="preview-img-${originalIndex}" src="${imgSrc}" alt="문제 사진" onerror="${onErr}">
                    <input type="text" class="ans-input" value="${item.answer}" onchange="handleAnswerChange(event, ${originalIndex})" placeholder="정답 입력">
                    <input type="text" id="img-url-${originalIndex}" class="img-url-input" value="${item.img}" onchange="handleImgUrlChange(event, ${originalIndex})" placeholder="사진 이름/URL">
                    <label class="upload-label">
                        + 이미지 교체
                        <input type="file" accept="image/*" onchange="handleImageUpload(event, ${originalIndex})">
                    </label>
                `;
                questionsGrid.appendChild(card);
            });
        }

        function handleAnswerChange(event, index) {
            quizData[index].answer = event.target.value;

        function handleImgUrlChange(event, index) {
            const newUrl = event.target.value;
            quizData[index].img = newUrl;
            const previewImg = document.getElementById(`preview-img-${index}`);
            
            const hasExt = newUrl.startsWith('blob:') || newUrl.startsWith('http') || newUrl.includes('.');
            
            previewImg.onerror = function() {
                if (!hasExt && this.src.includes('.jpg')) {
                    this.src = newUrl + '.png';
                } else {
                    this.src = 'https://via.placeholder.com/150?text=이미지+없음';
                }
            };
            previewImg.src = hasExt ? newUrl : newUrl + ".jpg";
        }

        function handleImageUpload(event, index) {
            const file = event.target.files[0];
            if (file) {
                const imageUrl = URL.createObjectURL(file);
                quizData[index].img = imageUrl;
                document.getElementById(`preview-img-${index}`).src = imageUrl;
                document.getElementById(`img-url-${index}`).value = "[임시 적용됨]";
            }
        }

            const sortedScores = [...teamScores].sort((a, b) => b.score - a.score);
            
            sortedScores.forEach((item, index) => {

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

            audioEl.currentTime = 0; 
            audioEl.play().catch(e => console.log("사운드 재생 실패:", e));

            audioEl.pause();

                return;

            infoTeam.innerText = `팀: ${currentTeamName}`;
            
            score = 0;
            infoScore.innerText = `점수: 0`;

            const filteredData = quizData.filter(item => selectedThemes.includes(item.category));

            let count = parseInt(questionCountInput.value, 10);
            if (isNaN(count) || count < 1) count = 1;
            if (count > filteredData.length) count = filteredData.length;

            selectedQuizData = shuffleArray(filteredData).slice(0, count);

            startBtn.style.display = 'none';
            setupArea.style.display = 'none'; 
            
            btnO.style.display = 'block';
            btnX.style.display = 'block';
            answerBtn.style.display = 'block';

            nextSlide();

                    this.src = baseImg + ".png"; // JPG 실패 시 PNG로 재시도
                    return; 
                }
                startTimer(LIMIT_SEC); // 둘 다 실패 시 무한 멈춤 방지를 위해 강제 타이머 시작
            };
            
            imgElement.onload = function() {
                startTimer(LIMIT_SEC);
            };

            imgElement.style.display = 'block';
            imgElement.src = hasExt ? baseImg : baseImg + ".jpg"; // 우선 JPG로 호출
            
            answerText.style.visibility = 'hidden'; 
            answerText.innerText = selectedQuizData[currentIndex].answer;
            
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#4caf50';
        }

        function startTimer(seconds) {
            let timeLeft = seconds * 100; 
            
            playSound(sndTick);
            clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeLeft--;
                let percentage = (timeLeft / (seconds * 100)) * 100;
                timerBar.style.width = percentage + '%';

                if (percentage < 40) {
                    timerBar.style.backgroundColor = '#d32f2f'; 
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    stopSound(sndTick);
                    showAnswer();
                }
            }, 10);
        }

        function markAnswer(isCorrect) {
            if (isProcessing) return; 
            isProcessing = true;
            
            clearInterval(timerInterval);
            stopSound(sndTick);
            
            if (isCorrect) {
                playSound(sndDing);
                score++;
                infoScore.innerText = `점수: ${score}`;
                oxOverlay.innerText = "O";
                oxOverlay.className = "ox-o";
            } else {
                playSound(sndWrong);
                oxOverlay.innerText = "X";
                oxOverlay.className = "ox-x";
            }
            
            oxOverlay.style.display = 'block';
            answerText.style.visibility = 'visible';
            timerBar.style.width = '0%';
            
            setTimeout(() => {
                nextSlide();
            }, 800);
        }

        function stopQuiz() {
            if (isProcessing || currentIndex < 0) return;

            clearInterval(timerInterval);
            stopSound(sndTick);
            
            showCustomModal("정말 퀴즈를 그만하시겠습니까?", true, 
                () => {
                    endQuiz(false); 
                },
                () => {
                    startTimer(LIMIT_SEC); 
                }
            );
        }

        function endQuiz(isCompleted) {
            clearInterval(timerInterval);
            stopSound(sndTick);
            
            teamScores.push({ team: currentTeamName, score: score });
            
            let msg = isCompleted ? "퀴즈가 모두 끝났습니다! 🎉\n\n" : "퀴즈가 중간에 종료되었습니다. 🛑\n\n";
            msg += `[ ${currentTeamName} ] 팀의 최종 점수: ${score}점\n(총 ${selectedQuizData.length}문제 중)`;
            
            showCustomModal(msg, false, () => {
                resetToStartScreen(); 
                toggleScoreboard();   
            });
        }

        function showAnswer() {
            if(answerText.style.visibility === 'visible' || isProcessing) return;

            clearInterval(timerInterval);
            stopSound(sndTick);
            playSound(sndDing);

            answerText.style.visibility = 'visible';
            timerBar.style.width = '0%';
        }

        document.addEventListener('keydown', (event) => {
            if (isPaused) return;
            if (modal.style.display === 'flex') return;
            if (scoreboardModal.style.display === 'flex') return;
            if (event.target.tagName === 'INPUT') return;

            if (currentIndex === -1) {
                if(event.code === 'Space' || event.code === 'Enter') {
                    event.preventDefault();
                    startQuiz();
                }
                return;
            }

            if (currentIndex >= 0 && !isProcessing) {
                if (event.code === 'ArrowLeft') {
                    event.preventDefault();
                    markAnswer(true); 
                } else if (event.code === 'ArrowRight') {
                    event.preventDefault();
                    markAnswer(false); 
                } else if (event.code === 'Escape') {
                    stopQuiz(); 
                } else if (event.code === 'Space' && !answerBtn.disabled) {
                    event.preventDefault();
                    showAnswer();
                } else if (event.code === 'Enter') {
                    event.preventDefault();
                    markAnswer(false);
                }
            }
        });
    </script>
</body>
</html>
