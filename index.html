<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>생태 스피드 퀴즈! (사운드 포함)</title>
    <!-- 구글 폰트 적용 (동글동글한 Jua 글씨체) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        /* 💡 기본적으로 한글 어절이 중간에 끊기지 않도록 설정 */
        * { word-break: keep-all; box-sizing: border-box; }
        
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #e8f5e9; font-family: 'Jua', sans-serif; overflow: hidden; user-select: none; }
        .logo { height: 80px; margin-top: 15px; margin-bottom: 10px; object-fit: contain; }
        h1 { color: #2e7d32; margin-top: 0; margin-bottom: 10px; font-size: 4rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); text-align: center; line-height: 1.2; }
        
        #image-container { width: 95%; max-width: 1000px; height: 50vh; background-color: white; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 6px solid #fff; }
        /* 💡 퀴즈 이미지가 항상 중앙에 오도록 margin: auto 추가 */
        #quiz-image { max-width: 100%; max-height: 100%; object-fit: contain; display: none; margin: auto; }
        
        #timer-container { width: 95%; max-width: 1000px; height: 35px; background-color: #c8e6c9; margin-top: 20px; border-radius: 17px; overflow: hidden; border: 3px solid #a5d6a7; }
        #timer-bar { width: 100%; height: 100%; background-color: #4caf50; transition: width 0.1s linear, background-color 0.5s; }
        
        #answer-text { font-size: 5rem; color: #d32f2f; margin-top: 15px; visibility: hidden; height: 70px; text-shadow: 3px 3px 0 #fff; line-height: 1; text-align: center; }
        
        /* 상단 상태바 (팀, 문제 진행률, 점수) */
        #info-bar { width: 95%; max-width: 1000px; display: none; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 15px; }
        #stage-text { color: #558b2f; margin: 0; font-size: 2rem; display: none; text-align: center; }
        #info-team { font-size: 1.8rem; color: #1b5e20; background: #c8e6c9; padding: 10px 20px; border-radius: 10px; box-shadow: 0 3px 0 #a5d6a7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
        #info-score { font-size: 1.8rem; color: #c62828; background: #ffcdd2; padding: 10px 20px; border-radius: 10px; box-shadow: 0 3px 0 #ef9a9a; white-space: nowrap; }
        
        /* OX 마크 */
        #ox-overlay { position: absolute; font-size: 25rem; z-index: 20; display: none; text-shadow: 0 0 40px rgba(255,255,255,1); pointer-events: none; }
        .ox-o { color: #1976d2; }
        .ox-x { color: #d32f2f; }

        /* 시작 설정 화면 */
        #setup-area { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; padding: 30px; width: 100%; max-height: 100%; overflow-y: auto; margin: auto 0; }
        #setup-area h2 { font-size: 2.2rem; margin-bottom: 10px; color: #1b5e20; }
        .input-group { background-color: #f1f8e9; padding: 20px 30px; border-radius: 12px; border: 3px solid #a5d6a7; display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 1.6rem; color: #2e7d32; width: 100%; max-width: 600px; }
        .input-group input { font-family: 'Jua', sans-serif; font-size: 1.5rem; padding: 8px 15px; width: 140px; text-align: center; border: 3px solid #81c784; border-radius: 8px; outline: none; }
        .input-group input:focus { border-color: #2e7d32; }
        .setup-btns { display: flex; gap: 15px; justify-content: center; margin-top: 10px; width: 100%; max-width: 600px; }
        .btn-blue { background-color: #1976d2; box-shadow: 0 5px 0 #0d47a1; }
        .btn-blue:hover { background-color: #1565c0; box-shadow: 0 3px 0 #0d47a1; }
        .btn-orange { background-color: #f57c00; box-shadow: 0 5px 0 #e65100; }
        .btn-orange:hover { background-color: #ef6c00; box-shadow: 0 3px 0 #e65100; }
        
        /* 전체 문제 보기 모달 스타일 */
        #all-questions-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background-color: #e8f5e9; border-radius: 20px; width: 100%; max-width: 1200px; max-height: 90vh; padding: 35px; position: relative; display: flex; flex-direction: column; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 3.5rem; color: #2e7d32; cursor: pointer; line-height: 1; transition: 0.2s; }
        .close-btn:hover { color: #1b5e20; transform: scale(1.1); }
        #questions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; overflow-y: auto; padding-right: 15px; margin-top: 20px; }
        .q-card { background: #fff; border: 3px solid #a5d6a7; border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: flex-start; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .q-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; background-color: #f5f5f5; border: 1px solid #e0e0e0; }
        .q-card .ans-input { color: #d32f2f; font-weight: bold; font-size: 1.4rem; margin-bottom: 8px; text-align: center; border: 2px dashed #ef9a9a; border-radius: 6px; padding: 6px; width: 100%; font-family: 'Jua', sans-serif; transition: 0.2s; }
        .q-card .ans-input:focus { outline: none; border: 2px solid #d32f2f; background-color: #ffebee; }
        .q-card .img-url-input { font-size: 0.95rem; margin-bottom: 10px; text-align: center; border: 2px solid #c8e6c9; border-radius: 6px; padding: 6px; width: 100%; font-family: sans-serif; }
        .upload-label { display: inline-block; background-color: #4caf50; color: white; padding: 10px 12px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: auto; box-shadow: 0 3px 0 #388e3c; }
        .upload-label:hover { background-color: #388e3c; transform: translateY(2px); box-shadow: 0 1px 0 #2e7d32; }
        .upload-label input[type="file"] { display: none; }

        /* 점수 집계판 모달 스타일 */
        #scoreboard-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .score-list-container { max-height: 55vh; overflow-y: auto; margin-top: 30px; text-align: left; padding-right: 15px; }
        .score-item { display: flex; justify-content: space-between; font-size: 2rem; padding: 20px 15px; border-bottom: 3px dashed #a5d6a7; color: #1b5e20; align-items: center; gap: 10px; }
        .score-rank { font-weight: bold; min-width: 90px; font-size: 2.2rem; white-space: nowrap; }
        .score-name { flex-grow: 1; text-align: center; padding: 0 10px; }
        .score-points { font-weight: bold; color: #d32f2f; font-size: 2.2rem; min-width: 90px; text-align: right; white-space: nowrap; }

        /* 커스텀 모달 스타일 */
        #custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .custom-modal { background: #fff; padding: 50px 30px; border-radius: 20px; text-align: center; border: 5px solid #a5d6a7; width: 100%; max-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        #custom-modal-msg { font-size: 2rem; color: #2e7d32; margin-top: 0; margin-bottom: 40px; white-space: pre-wrap; line-height: 1.4; font-family: 'Jua', sans-serif; }
        .custom-modal-btns { display: flex; gap: 20px; justify-content: center; }
        .custom-modal-btns button { padding: 15px 30px; font-size: 1.5rem; border-radius: 10px; flex: 1; }
        #custom-btn-cancel { background-color: #757575; box-shadow: 0 5px 0 #424242; }
        #custom-btn-cancel:hover { background-color: #616161; box-shadow: 0 3px 0 #424242; }
        #custom-btn-cancel:active { transform: translateY(4px); box-shadow: 0 1px 0 #424242; }

        /* 하단 조작 컨트롤 */
        .controls { margin-top: 20px; display: flex; gap: 20px; width: 95%; max-width: 1000px; justify-content: center; }
        button { font-family: 'Jua', sans-serif; padding: 20px 30px; font-size: 1.6rem; cursor: pointer; border: none; border-radius: 12px; color: white; background-color: #2e7d32; transition: 0.2s; box-shadow: 0 5px 0 #1b5e20; touch-action: manipulation; white-space: nowrap; }
        button:hover { background-color: #1b5e20; transform: translateY(2px); box-shadow: 0 3px 0 #1b5e20; }
        button:active { transform: translateY(5px); box-shadow: 0 0px 0 #1b5e20; }
        button:disabled { background-color: #a5d6a7; box-shadow: 0 5px 0 #81c784; cursor: not-allowed; opacity: 0.7; }
        
        #btn-o, #btn-x { flex: 1; }
        #answer-btn, #btn-stop { flex: 1; }

        /* PC 버전 전용 줄바꿈 관리 클래스 */
        .mobile-br { display: none; }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #e8f5e9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #81c784; border-radius: 10px; border: 2px solid #e8f5e9; }

        /* 📱 모바일 디바이스 최적화 (폭 768px 이하) */
        @media (max-width: 768px) {
            .logo { height: 50px; margin-top: 5px; }
            h1 { font-size: 2.3rem; margin-bottom: 5px; }
            
            /* 정보창 모바일 3단 분리 레이아웃 */
            #info-bar { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 10px; margin-bottom: 10px; }
            #stage-text { grid-column: 1 / 3; grid-row: 1; font-size: 1.5rem; margin-bottom: 0; }
            #info-team { grid-column: 1; grid-row: 2; font-size: 1.3rem; padding: 8px 10px; max-width: none; }
            #info-score { grid-column: 2; grid-row: 2; font-size: 1.3rem; padding: 8px 10px; text-align: center; }
            
            /* 💡 모바일에서 스크롤이 안 잘리게 flex-start 속성 부여 */
            #image-container { height: 45vh; border-width: 4px; border-radius: 15px; align-items: flex-start; padding-bottom: 10px; }
            #ox-overlay { font-size: 15rem; align-self: center; }
            
            #timer-container { height: 20px; margin-top: 15px; }
            #answer-text { font-size: 3.5rem; margin-top: 10px; height: 50px; }
            
            /* 시작 설정 화면 모바일 최적화 (스크롤 가능) */
            #setup-area { padding: 15px 10px; gap: 12px; justify-content: flex-start; }
            #setup-area h2 { font-size: 1.4rem; }
            .input-group { flex-direction: column; padding: 15px; gap: 8px; font-size: 1.4rem; }
            .input-group input { width: 100%; max-width: none; font-size: 1.4rem; }
            
            /* 시작 화면 버튼 2열 바둑판 */
            .setup-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
            .setup-btns button { width: 100%; font-size: 1.15rem; padding: 12px 5px; line-height: 1.4; white-space: normal; }
            
            .mobile-br { display: block; }
            .desktop-space { display: none; }
            
            /* 💡 컨트롤 버튼 모바일 바둑판(2x2) 배열 */
            .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
            button { width: 100%; padding: 15px 10px; font-size: 1.4rem; white-space: normal; line-height: 1.3; }
            #start-btn { grid-column: 1 / 3; padding: 18px 10px; font-size: 1.6rem; }
            
            /* 모달창 모바일화 */
            .modal-content { padding: 20px 15px; max-height: 90vh; }
            .close-btn { top: 10px; right: 15px; font-size: 2.5rem; }
            #all-questions-modal h2, #scoreboard-modal h2 { font-size: 1.8rem; }
            #questions-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
            .q-card { padding: 10px; }
            .q-card img { height: 100px; }
            .q-card .ans-input { font-size: 1.2rem; }
            
            .score-item { font-size: 1.5rem; padding: 15px 5px; }
            .score-rank, .score-points { font-size: 1.6rem; min-width: 70px; }
            
            #custom-modal-msg { font-size: 1.6rem; }
            .custom-modal-btns button { font-size: 1.3rem; padding: 12px 15px; }
        }
    </style>
</head>
<body>

    <!-- 전달해주신 로고 이미지 적용 -->
    <img src="50436.png" alt="국립장성숲체원 로고" class="logo">
    <h1>🌿 생태 스피드 퀴즈</h1>
    
    <div id="info-bar">
        <div id="info-team">팀: -</div>
        <h2 id="stage-text"></h2>
        <div id="info-score">점수: 0</div>
    </div>
    
    <div id="image-container">
        <div id="ox-overlay"></div>
        <div id="setup-area">
            <h2>아래 '시작' 버튼을 누르면 퀴즈가 시작됩니다!<br>(소리를 켜주세요 🔊)</h2>
            <div class="input-group">
                <label for="team-name">참가 팀 이름:</label>
                <input type="text" id="team-name" placeholder="입력 생략 가능">
            </div>
            <div class="input-group">
                <label for="question-count">진행할 문제 수:</label>
                <div style="display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center;">
                    <input type="number" id="question-count" min="1" value="50">
                    <span id="max-count-label"></span>
                </div>
            </div>
            <div class="setup-btns">
                <button onclick="toggleScoreboard()" class="btn-blue">🏆 팀별 점수<span class="desktop-space"> </span><br class="mobile-br">집계판</button>
                <button onclick="toggleAllQuestions()" class="btn-orange">👀 전체 문제<span class="desktop-space"> </span><br class="mobile-br">확인 및 수정</button>
            </div>
        </div>
        <img id="quiz-image" src="" alt="퀴즈 이미지">
    </div>

    <div id="timer-container">
        <div id="timer-bar"></div>
    </div>

    <div id="answer-text">정답!</div>

    <div class="controls">
        <button id="start-btn" onclick="startQuiz()">시작</button>
        <button id="btn-o" onclick="markAnswer(true)" style="background-color: #1976d2; display: none;">정답 O</button>
        <button id="btn-x" onclick="markAnswer(false)" style="background-color: #e53935; display: none;">오답 X</button>
        <button id="answer-btn" onclick="showAnswer()" disabled style="display: none;">정답 보기</button>
        <button id="btn-stop" onclick="stopQuiz()" style="background-color: #616161; display: none;">그만하기</button>
    </div>

    <audio id="snd-tick" src="ticking.mp3" preload="auto"></audio>
    <audio id="snd-ding" src="ding.mp3" preload="auto"></audio>

    <!-- 커스텀 알림/확인 모달 -->
    <div id="custom-modal-overlay">
        <div class="custom-modal">
            <p id="custom-modal-msg"></p>
            <div class="custom-modal-btns">
                <button id="custom-btn-ok" style="background-color: #2e7d32; box-shadow: 0 5px 0 #1b5e20;">확인</button>
                <button id="custom-btn-cancel">취소</button>
            </div>
        </div>
    </div>

    <!-- 전체 문제 보기 모달 -->
    <div id="all-questions-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleAllQuestions()">&times;</span>
            <h2 style="color: #2e7d32; margin-top: 0; border-bottom: 3px solid #a5d6a7; padding-bottom: 15px; margin-bottom: 10px; font-size: 2.2rem;">전체 문제 목록 (총 <span id="total-q-count">50</span>문제)</h2>
            <p style="color: #d32f2f; font-size: 1.1rem; margin: 0 0 15px 0;">⚠️ 모달창에서 수정한 정답과 사진은 <b>새로고침 시 초기화</b>됩니다. 영구 반영하려면 깃허브 코드를 수정하세요.</p>
            <div id="questions-grid">
                <!-- 자바스크립트로 문제 카드가 생성됩니다 -->
            </div>
        </div>
    </div>

    <!-- 점수 집계판 모달 -->
    <div id="scoreboard-modal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close-btn" onclick="toggleScoreboard()">&times;</span>
            <h2 style="color: #2e7d32; margin-top: 0; border-bottom: 3px solid #a5d6a7; padding-bottom: 15px; margin-bottom: 10px; text-align: center; font-size: 2.5rem;">🏆 명예의 전당</h2>
            <div class="score-list-container" id="score-list">
                <!-- 자바스크립트로 점수 목록이 생성됩니다 -->
            </div>
        </div>
    </div>

    <script>
        // 💡 문제 데이터 (단계 표시는 데이터 구조상 유지되나 화면에는 노출되지 않음)

            { stage: "1단계: 몸풀기", answer: "나비", img: "./images/12.jpg" },
            { stage: "1단계: 몸풀기", answer: "매미", img: "./images/13.jpg" },
            { stage: "1단계: 몸풀기", answer: "지렁이", img: "./images/14.jpg" },
            { stage: "1단계: 몸풀기", answer: "소나무", img: "./images/15.jpg" },
            { stage: "1단계: 몸풀기", answer: "은행나무", img: "./images/16.jpg" },

            { stage: "2단계: 생태 탐험가", answer: "참나무", img: "./images/23.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "대나무", img: "./images/24.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "고사리", img: "./images/25.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "이끼", img: "./images/26.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "독버섯", img: "./images/27.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "표고버섯", img: "./images/28.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "칡덩굴", img: "./images/29.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "호랑나비", img: "./images/30.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "물총새", img: "./images/31.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "파리매", img: "./images/32.jpg" },
            { stage: "2단계: 생태 탐험가", answer: "하늘소", img: "./images/33.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "타잔", img: "./images/34.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "곰돌이 푸", img: "./images/35.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "팅커벨", img: "./images/36.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "피터팬", img: "./images/37.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "이웃집 토토로", img: "./images/38.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "스머프", img: "./images/39.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "숲해설가", img: "./images/40.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "등산객", img: "./images/41.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "나무꾼", img: "./images/42.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "식물학자", img: "./images/43.jpg" },
            { stage: "3단계: 캐릭터 및 인물", answer: "파브르", img: "./images/44.jpg" },
            { stage: "4단계: 숲 체험 도구", answer: "루페", img: "./images/45.jpg" },
            { stage: "4단계: 숲 체험 도구", answer: "청진기", img: "./images/46.jpg" },
            { stage: "4단계: 숲 체험 도구", answer: "등산화", img: "./images/47.jpg" },
            { stage: "4단계: 숲 체험 도구", answer: "배낭", img: "./images/48.jpg" },
            { stage: "4단계: 숲 체험 도구", answer: "나침반", img: "./images/49.jpg" },
            { stage: "4단계: 숲 체험 도구", answer: "도감", img: "./images/50.jpg" }
        ];

        let teamScores = []; 
        let selectedQuizData = []; 
        let currentIndex = -1;
        let timerInterval;
        let score = 0;
        let currentTeamName = "";
        let isProcessing = false; 
        let isPaused = false; 
        let modalOkCallback = null;
        let modalCancelCallback = null;
        const LIMIT_SEC = 3; 

        const imgElement = document.getElementById('quiz-image');
        const setupArea = document.getElementById('setup-area');
        const teamNameInput = document.getElementById('team-name');
        const questionCountInput = document.getElementById('question-count');
        const maxCountLabel = document.getElementById('max-count-label');
        const timerBar = document.getElementById('timer-bar');
        const answerText = document.getElementById('answer-text');
        
        const infoBar = document.getElementById('info-bar');
        const infoTeam = document.getElementById('info-team');
        const infoScore = document.getElementById('info-score');
        const stageText = document.getElementById('stage-text'); 
        const oxOverlay = document.getElementById('ox-overlay');
        
        const startBtn = document.getElementById('start-btn');
        const btnO = document.getElementById('btn-o');
        const btnX = document.getElementById('btn-x');
        const answerBtn = document.getElementById('answer-btn');
        const btnStop = document.getElementById('btn-stop');
        
        const modal = document.getElementById('all-questions-modal');
        const questionsGrid = document.getElementById('questions-grid');
        const totalQCount = document.getElementById('total-q-count');
        
        const scoreboardModal = document.getElementById('scoreboard-modal');
        const scoreList = document.getElementById('score-list');

        questionCountInput.max = quizData.length;
        questionCountInput.value = quizData.length; 
        maxCountLabel.innerText = `/ 최대 ${quizData.length}문제`;
        totalQCount.innerText = quizData.length;

        function renderAllQuestions() {
            questionsGrid.innerHTML = "";
            quizData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'q-card';
                // 💡 전체 문제 미리보기 모달에서도 "N단계: 몸풀기" 텍스트를 제거했습니다.
                card.innerHTML = `
                    <img id="preview-img-${index}" src="${item.img}" alt="문제 사진" onerror="this.src='https://via.placeholder.com/150?text=이미지+없음'">
                    <input type="text" class="ans-input" value="${item.answer}" onchange="handleAnswerChange(event, ${index})" placeholder="정답 입력">
                    <input type="text" id="img-url-${index}" class="img-url-input" value="${item.img}" onchange="handleImgUrlChange(event, ${index})" placeholder="사진 경로/URL">
                    <label class="upload-label">
                        + PC 이미지 등록
                        <input type="file" accept="image/*" onchange="handleImageUpload(event, ${index})">
                    </label>
                `;
                questionsGrid.appendChild(card);
            });
        }
        renderAllQuestions(); 

        function handleAnswerChange(event, index) {
            quizData[index].answer = event.target.value;
        }

        function handleImgUrlChange(event, index) {
            const newUrl = event.target.value;
            quizData[index].img = newUrl;
            document.getElementById(`preview-img-${index}`).src = newUrl;
        }

        function handleImageUpload(event, index) {
            const file = event.target.files[0];
            if (file) {
                const imageUrl = URL.createObjectURL(file);
                quizData[index].img = imageUrl;
                document.getElementById(`preview-img-${index}`).src = imageUrl;
                document.getElementById(`img-url-${index}`).value = "[임시 적용됨]";
            }
        }

        function showCustomModal(msg, isConfirm, onOk, onCancel) {
            isPaused = true;
            document.getElementById('custom-modal-msg').innerText = msg;
            document.getElementById('custom-modal-overlay').style.display = 'flex';
            
            const btnCancel = document.getElementById('custom-btn-cancel');
            if (isConfirm) {
                btnCancel.style.display = 'block';
            } else {
                btnCancel.style.display = 'none';
            }

            modalOkCallback = onOk;
            modalCancelCallback = onCancel;
        }

        document.getElementById('custom-btn-ok').onclick = () => {
            document.getElementById('custom-modal-overlay').style.display = 'none';
            isPaused = false;
            if (modalOkCallback) modalOkCallback();
        };

        document.getElementById('custom-btn-cancel').onclick = () => {
            document.getElementById('custom-modal-overlay').style.display = 'none';
            isPaused = false;
            if (modalCancelCallback) modalCancelCallback();
        };

        function toggleAllQuestions() {
            if (modal.style.display === "flex") {
                modal.style.display = "none";
            } else {
                modal.style.display = "flex";
            }
        }

        function toggleScoreboard() {
            if (scoreboardModal.style.display === "flex") {
                scoreboardModal.style.display = "none";
            } else {
                renderScoreboard();
                scoreboardModal.style.display = "flex";
            }
        }

        function renderScoreboard() {
            scoreList.innerHTML = "";
            if (teamScores.length === 0) {
                scoreList.innerHTML = "<p style='text-align:center; font-size:1.5rem; color:#757575; padding: 40px;'>아직 기록된 점수가 없습니다.<br>퀴즈에 도전해 보세요!</p>";
                return;
            }
            
            const sortedScores = [...teamScores].sort((a, b) => b.score - a.score);
            
            sortedScores.forEach((item, index) => {
                let rankIcon = `${index + 1}위`;
                if(index === 0) rankIcon = "🥇 1위";
                else if(index === 1) rankIcon = "🥈 2위";
                else if(index === 2) rankIcon = "🥉 3위";

                scoreList.innerHTML += `
                    <div class="score-item">
                        <span class="score-rank">${rankIcon}</span>
                        <span class="score-name">${item.team}</span>
                        <span class="score-points">${item.score}점</span>
                    </div>
                `;
            });
        }

        function resetToStartScreen() {
            currentIndex = -1;
            isProcessing = false;
            isPaused = false;
            
            setupArea.style.display = 'flex';
            startBtn.style.display = 'block';
            
            infoBar.style.display = 'none';
            btnO.style.display = 'none';
            btnX.style.display = 'none';
            answerBtn.style.display = 'none';
            btnStop.style.display = 'none';
            
            imgElement.style.display = 'none';
            stageText.style.display = 'none';
            answerText.style.visibility = 'hidden';
            oxOverlay.style.display = 'none';
            
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#4caf50';
        }

        const sndTick = document.getElementById('snd-tick');
        const sndDing = document.getElementById('snd-ding');

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function playSound(audioEl) {
            audioEl.currentTime = 0; 
            audioEl.play().catch(e => console.log("사운드 재생 실패:", e));
        }

        function stopSound(audioEl) {
            audioEl.pause();
            audioEl.currentTime = 0;
        }

        function startQuiz() {
            currentTeamName = teamNameInput.value.trim() || "도전자";
            infoTeam.innerText = `팀: ${currentTeamName}`;
            
            score = 0;
            infoScore.innerText = `점수: 0`;

            let count = parseInt(questionCountInput.value, 10);
            if (isNaN(count) || count < 1) count = 1;
            if (count > quizData.length) count = quizData.length;

            selectedQuizData = shuffleArray(quizData).slice(0, count);

            startBtn.style.display = 'none';
            setupArea.style.display = 'none'; 
            
            btnO.style.display = 'block';
            btnX.style.display = 'block';
            answerBtn.style.display = 'block';
            btnStop.style.display = 'block';
            infoBar.style.display = 'flex';
            
            answerBtn.disabled = false;
            nextSlide();
        }

        function nextSlide() {
            isProcessing = false;
            oxOverlay.style.display = 'none'; 
            
            clearInterval(timerInterval);
            stopSound(sndTick);
            
            currentIndex++;
            
            if (currentIndex >= selectedQuizData.length) {
                endQuiz(true); 
                return;
            }

            // 💡 "1단계: 몸풀기" 같은 단계 표시를 제거하고 심플하게 '문제 1 / 50' 로만 표시합니다.
            stageText.style.display = 'block';
            stageText.innerText = `문제 ${currentIndex + 1} / ${selectedQuizData.length}`;

            imgElement.style.display = 'block';
            imgElement.src = selectedQuizData[currentIndex].img;
            answerText.style.visibility = 'hidden'; 
            answerText.innerText = selectedQuizData[currentIndex].answer;
            
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#4caf50';

            if (imgElement.complete) {
                startTimer(LIMIT_SEC);
            } else {
                imgElement.onload = function() {
                    startTimer(LIMIT_SEC);
                }
                imgElement.onerror = function() {
                    startTimer(LIMIT_SEC); 
                }
            }
        }

        function startTimer(seconds) {
            let timeLeft = seconds * 100; 
            
            playSound(sndTick);
            clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeLeft--;
                let percentage = (timeLeft / (seconds * 100)) * 100;
                timerBar.style.width = percentage + '%';

                if (percentage < 40) {
                    timerBar.style.backgroundColor = '#d32f2f'; 
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    stopSound(sndTick);
                    showAnswer(true);
                }
            }, 10);
        }

        function markAnswer(isCorrect) {
            if (isProcessing) return; 
            isProcessing = true;
            
            clearInterval(timerInterval);
            stopSound(sndTick);
            
            if (isCorrect) {
                playSound(sndDing);
                score++;
                infoScore.innerText = `점수: ${score}`;
                oxOverlay.innerText = "O";
                oxOverlay.className = "ox-o";
            } else {
                oxOverlay.innerText = "X";
                oxOverlay.className = "ox-x";
            }
            
            oxOverlay.style.display = 'block';
            answerText.style.visibility = 'visible';
            timerBar.style.width = '0%';
            
            setTimeout(() => {
                nextSlide();
            }, 800);
        }

        function stopQuiz() {
            if (isProcessing || currentIndex < 0) return;

            clearInterval(timerInterval);
            stopSound(sndTick);
            
            showCustomModal("정말 퀴즈를 그만하시겠습니까?", true, 
                () => {
                    endQuiz(false); 
                },
                () => {
                    startTimer(LIMIT_SEC); 
                }
            );
        }

        function endQuiz(isCompleted) {
            clearInterval(timerInterval);
            stopSound(sndTick);
            
            teamScores.push({ team: currentTeamName, score: score });
            
            let msg = isCompleted ? "퀴즈가 모두 끝났습니다! 🎉\n\n" : "퀴즈가 중간에 종료되었습니다. 🛑\n\n";
            msg += `[ ${currentTeamName} ] 팀의 최종 점수: ${score}점\n(총 ${selectedQuizData.length}문제 중)`;
            
            showCustomModal(msg, false, () => {
                resetToStartScreen(); 
                toggleScoreboard();   
            });
        }

        function showAnswer(isTimeout = false) {
            if(answerText.style.visibility === 'visible' || isProcessing) return;

            clearInterval(timerInterval);
            stopSound(sndTick);
            playSound(sndDing);

            answerText.style.visibility = 'visible';
            timerBar.style.width = '0%';
        }

        document.addEventListener('keydown', (event) => {
            if (isPaused) return;
            if (modal.style.display === 'flex') return;
            if (scoreboardModal.style.display === 'flex') return;
            if (event.target.tagName === 'INPUT') return;

            if (currentIndex === -1) {
                if(event.code === 'Space' || event.code === 'Enter') {
                    event.preventDefault();
                    startQuiz();
                }
                return;
            }

            if (currentIndex >= 0 && !isProcessing) {
                if (event.code === 'ArrowLeft') {
                    event.preventDefault();
                    markAnswer(true); 
                } else if (event.code === 'ArrowRight') {
                    event.preventDefault();
                    markAnswer(false); 
                } else if (event.code === 'Escape') {
                    stopQuiz(); 
                } else if (event.code === 'Space' && !answerBtn.disabled) {
                    event.preventDefault();
                    showAnswer();
                } else if (event.code === 'Enter') {
                    event.preventDefault();
                    markAnswer(false);
                }
            }
        });
    </script>
</body>
</html>
