<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생태 스피드 퀴즈! (사운드 포함)</title>
    <!-- 구글 폰트 적용 (동글동글한 Jua 글씨체) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #e8f5e9; font-family: 'Jua', sans-serif; overflow: hidden; user-select: none; }
        .logo { height: 80px; margin-top: 15px; margin-bottom: 10px; object-fit: contain; }
        h1 { color: #2e7d32; margin-top: 0; margin-bottom: 10px; font-size: 4rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        #stage-text { color: #558b2f; margin-top: 0; margin-bottom: 15px; font-size: 2rem; display: none; }
        
        #image-container { width: 95%; max-width: 1000px; height: 55vh; background-color: white; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 6px solid #fff; }
        #quiz-image { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        
        #timer-container { width: 95%; max-width: 1000px; height: 35px; background-color: #c8e6c9; margin-top: 30px; border-radius: 17px; overflow: hidden; border: 3px solid #a5d6a7; }
        #timer-bar { width: 100%; height: 100%; background-color: #4caf50; transition: width 0.1s linear, background-color 0.5s; }
        
        #answer-text { font-size: 5rem; color: #d32f2f; margin-top: 20px; visibility: hidden; height: 75px; text-shadow: 3px 3px 0 #fff; line-height: 1; }
        
        /* 추가된 UI 스타일 (점수, O/X 등) */
        #info-bar { width: 95%; max-width: 1000px; display: none; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; }
        #info-team { font-size: 1.8rem; color: #1b5e20; background: #c8e6c9; padding: 10px 20px; border-radius: 10px; box-shadow: 0 3px 0 #a5d6a7; }
        #info-score { font-size: 1.8rem; color: #c62828; background: #ffcdd2; padding: 10px 20px; border-radius: 10px; box-shadow: 0 3px 0 #ef9a9a; }
        
        #ox-overlay { position: absolute; font-size: 25rem; z-index: 20; display: none; text-shadow: 0 0 40px rgba(255,255,255,1); pointer-events: none; }
        .ox-o { color: #1976d2; }
        .ox-x { color: #d32f2f; }

        #setup-area { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; padding: 30px; }
        #setup-area h2 { font-size: 2.2rem; margin-bottom: 10px; color: #1b5e20; }
        .input-group { background-color: #f1f8e9; padding: 20px 30px; border-radius: 12px; border: 3px solid #a5d6a7; display: flex; align-items: center; gap: 15px; font-size: 1.6rem; color: #2e7d32; }
        .input-group input { font-family: 'Jua', sans-serif; font-size: 1.5rem; padding: 8px 15px; width: 110px; text-align: center; border: 3px solid #81c784; border-radius: 8px; outline: none; }
        .input-group input:focus { border-color: #2e7d32; }
        
        /* 전체 문제 보기 모달 스타일 */
        #all-questions-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-content { background-color: #e8f5e9; border-radius: 20px; width: 90%; max-width: 1200px; max-height: 85vh; padding: 35px; position: relative; display: flex; flex-direction: column; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 3.5rem; color: #2e7d32; cursor: pointer; line-height: 1; transition: 0.2s; }
        .close-btn:hover { color: #1b5e20; transform: scale(1.1); }
        #questions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; overflow-y: auto; padding-right: 15px; margin-top: 20px; }
        .q-card { background: #fff; border: 3px solid #a5d6a7; border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: flex-start; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .q-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; background-color: #f5f5f5; border: 1px solid #e0e0e0; }
        
        /* 수정 가능한 정답 및 이미지 경로 입력창 스타일 */
        .q-card .ans-input { color: #d32f2f; font-weight: bold; font-size: 1.4rem; margin-bottom: 8px; text-align: center; border: 2px dashed #ef9a9a; border-radius: 6px; padding: 6px; width: 100%; box-sizing: border-box; font-family: 'Jua', sans-serif; transition: 0.2s; }
        .q-card .ans-input:focus { outline: none; border: 2px solid #d32f2f; background-color: #ffebee; }
        .q-card .img-url-input { font-size: 0.95rem; margin-bottom: 10px; text-align: center; border: 2px solid #c8e6c9; border-radius: 6px; padding: 6px; width: 100%; box-sizing: border-box; font-family: sans-serif; }
        
        .q-card .stg { color: #558b2f; font-size: 1.1rem; margin-bottom: 8px; }
        
        /* 이미지 업로드 버튼 스타일 */
        .upload-label { display: inline-block; background-color: #4caf50; color: white; padding: 10px 12px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: auto; box-shadow: 0 3px 0 #388e3c; }
        .upload-label:hover { background-color: #388e3c; transform: translateY(2px); box-shadow: 0 1px 0 #2e7d32; }
        .upload-label input[type="file"] { display: none; }

        /* 점수 집계판 모달 스타일 */
        #scoreboard-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .score-list-container { max-height: 55vh; overflow-y: auto; margin-top: 30px; text-align: left; padding-right: 15px; }
        .score-item { display: flex; justify-content: space-between; font-size: 2rem; padding: 20px 15px; border-bottom: 3px dashed #a5d6a7; color: #1b5e20; align-items: center; }
        .score-rank { font-weight: bold; width: 100px; font-size: 2.2rem; }
        .score-name { flex-grow: 1; text-align: center; }
        .score-points { font-weight: bold; color: #d32f2f; font-size: 2.2rem; }

        /* 커스텀 모달 스타일 (alert/confirm 대체) */
        #custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .custom-modal { background: #fff; padding: 50px; border-radius: 20px; text-align: center; border: 5px solid #a5d6a7; min-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        #custom-modal-msg { font-size: 2rem; color: #2e7d32; margin-top: 0; margin-bottom: 40px; white-space: pre-wrap; line-height: 1.5; font-family: 'Jua', sans-serif; }
        .custom-modal-btns { display: flex; gap: 20px; justify-content: center; }
        .custom-modal-btns button { font-family: 'Jua', sans-serif; padding: 15px 40px; font-size: 1.5rem; border-radius: 10px; }
        #custom-btn-cancel { background-color: #757575; box-shadow: 0 5px 0 #424242; }
        #custom-btn-cancel:hover { background-color: #616161; box-shadow: 0 3px 0 #424242; }
        #custom-btn-cancel:active { transform: translateY(4px); box-shadow: 0 1px 0 #424242; }

        .controls { margin-top: 30px; display: flex; gap: 20px; }
        button { font-family: 'Jua', sans-serif; padding: 20px 40px; font-size: 1.6rem; cursor: pointer; border: none; border-radius: 12px; color: white; background-color: #2e7d32; transition: 0.2s; box-shadow: 0 5px 0 #1b5e20; }
        button:hover { background-color: #1b5e20; transform: translateY(2px); box-shadow: 0 3px 0 #1b5e20; }
        button:active { transform: translateY(5px); box-shadow: 0 0px 0 #1b5e20; }
        button:disabled { background-color: #a5d6a7; box-shadow: 0 5px 0 #81c784; cursor: not-allowed; opacity: 0.7; }
        
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #e8f5e9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #81c784; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4caf50; }
    </style>
</head>
<body>

    <!-- 전달해주신 로고 이미지 적용 -->
    <img src="50436.png" alt="국립장성숲체원 로고" class="logo">
    <h1>🌿 생태 스피드 퀴즈</h1>
    
    <div id="info-bar">
        <div id="info-team">팀: -</div>
        <h2 id="stage-text" style="display: block; margin: 0; font-size: 2rem; color: #558b2f;"></h2>
        <div id="info-score">점수: 0</div>
    </div>
    
    <div id="image-container">
        <div id="ox-overlay"></div>
        <div id="setup-area">
            <h2>아래 '시작' 버튼을 누르면 퀴즈가 시작됩니다!<br>(소리를 켜주세요 🔊)</h2>
            <div class="input-group">
                <label for="team-name">참가 팀 이름:</label>
                <input type="text" id="team-name" placeholder="입력 생략 가능" style="width: 180px;">
            </div>
            <div class="input-group">
                <label for="question-count">진행할 문제 수:</label>
                <input type="number" id="question-count" min="1" value="50">
                <span id="max-count-label"></span>
            </div>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px;">
                <button onclick="toggleScoreboard()" style="background-color: #1976d2; font-size: 1.3rem; padding: 15px 30px; box-shadow: 0 5px 0 #0d47a1;">🏆 팀별 점수 집계판</button>
                <button onclick="toggleAllQuestions()" style="background-color: #f57c00; font-size: 1.3rem; padding: 15px 30px; box-shadow: 0 5px 0 #e65100;">👀 전체 문제 확인 및 수정</button>
            </div>
        </div>
        <img id="quiz-image" src="" alt="퀴즈 이미지">
    </div>

    <div id="timer-container">
        <div id="timer-bar"></div>
    </div>

    <div id="answer-text">정답!</div>

    <div class="controls">
        <button id="start-btn" onclick="startQuiz()">시작</button>
        <button id="btn-o" onclick="markAnswer(true)" style="background-color: #1976d2; display: none;">정답 O (←)</button>
        <button id="btn-x" onclick="markAnswer(false)" style="background-color: #e53935; display: none;">오답 X (→)</button>
        <!-- 💡 정답 보기 버튼 단축키 텍스트 Space로 변경 -->
        <button id="answer-btn" onclick="showAnswer()" disabled>정답 보기 (Space)</button>
        <button id="btn-stop" onclick="stopQuiz()" style="background-color: #616161; display: none;">그만하기 (ESC)</button>
    </div>

    <audio id="snd-tick" src="ticking.mp3" preload="auto"></audio>
    <audio id="snd-ding" src="ding.mp3" preload="auto"></audio>

    <!-- 커스텀 알림/확인 모달 -->
    <div id="custom-modal-overlay">
        <div class="custom-modal">
            <p id="custom-modal-msg"></p>
            <div class="custom-modal-btns">
                <button id="custom-btn-ok" style="background-color: #2e7d32; box-shadow: 0 5px 0 #1b5e20;">확인</button>
                <button id="custom-btn-cancel">취소</button>
            </div>
        </div>
    </div>

    <!-- 전체 문제 보기 모달 -->
    <div id="all-questions-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleAllQuestions()">&times;</span>
            <h2 style="color: #2e7d32; margin-top: 0; border-bottom: 3px solid #a5d6a7; padding-bottom: 15px; margin-bottom: 10px; font-size: 2.5rem;">전체 문제 목록 (총 <span id="total-q-count">50</span>문제)</h2>
            <p style="color: #d32f2f; font-size: 1.2rem; margin: 0 0 15px 0;">⚠️ 모달창에서 수정한 정답과 사진은 <b>새로고침 시 초기화</b>됩니다. 영구 반영하려면 깃허브 코드나 폴더를 수정하세요.</p>
            <div id="questions-grid">
                <!-- 자바스크립트로 문제 카드가 생성됩니다 -->
            </div>
        </div>
    </div>

    <!-- 점수 집계판 모달 -->
    <div id="scoreboard-modal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close-btn" onclick="toggleScoreboard()">&times;</span>

            </div>

        let currentTeamName = "";
        let isProcessing = false; // O/X 처리 중 중복 클릭 방지
        let isPaused = false; // 모달 활성화 시 키보드 차단용
        let modalOkCallback = null;
        let modalCancelCallback = null;
        const LIMIT_SEC = 3; // 제한 시간(초)

        // DOM 요소
        const imgElement = document.getElementById('quiz-image');
        const setupArea = document.getElementById('setup-area');
        const teamNameInput = document.getElementById('team-name');
        const questionCountInput = document.getElementById('question-count');
        const maxCountLabel = document.getElementById('max-count-label');
        const timerBar = document.getElementById('timer-bar');
        const answerText = document.getElementById('answer-text');
        
        const infoBar = document.getElementById('info-bar');
        const infoTeam = document.getElementById('info-team');
        const infoScore = document.getElementById('info-score');
        const stageText = document.getElementById('stage-text'); // 단계 표시 영역
        const oxOverlay = document.getElementById('ox-overlay');
        
        const startBtn = document.getElementById('start-btn');
        const btnO = document.getElementById('btn-o');
        const btnX = document.getElementById('btn-x');
        const answerBtn = document.getElementById('answer-btn');
        const btnStop = document.getElementById('btn-stop');
        
        // 추가된 DOM 요소
        const modal = document.getElementById('all-questions-modal');
        const questionsGrid = document.getElementById('questions-grid');
        const totalQCount = document.getElementById('total-q-count');
        
        const scoreboardModal = document.getElementById('scoreboard-modal');
        const scoreList = document.getElementById('score-list');

        // 초기화: 전체 문제 수에 맞춰 최대값 및 라벨 업데이트
        questionCountInput.max = quizData.length;
        questionCountInput.value = quizData.length; // 기본 진행 문제 수를 50으로 세팅
        maxCountLabel.innerText = `/ 최대 ${quizData.length}문제`;
        totalQCount.innerText = quizData.length;

        // 전체 문제 목록 렌더링 함수
        function renderAllQuestions() {
            questionsGrid.innerHTML = "";
            quizData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'q-card';
                card.innerHTML = `
                    <div class="stg">${item.stage}</div>
                    <img id="preview-img-${index}" src="${item.img}" alt="문제 사진" onerror="this.src='https://via.placeholder.com/150?text=이미지+없음'">
                    <input type="text" class="ans-input" value="${item.answer}" onchange="handleAnswerChange(event, ${index})" placeholder="정답 입력">
                    <input type="text" id="img-url-${index}" class="img-url-input" value="${item.img}" onchange="handleImgUrlChange(event, ${index})" placeholder="사진 경로/URL">
                    <label class="upload-label">
                        + PC 이미지 등록
                        <input type="file" accept="image/*" onchange="handleImageUpload(event, ${index})">
                    </label>
                `;
                questionsGrid.appendChild(card);
            });
        }
        renderAllQuestions(); // 페이지 로드 시 백그라운드에서 미리 렌더링

        // 📝 [추가] 모달에서 정답 텍스트를 직접 변경했을 때 데이터 업데이트
        function handleAnswerChange(event, index) {
            quizData[index].answer = event.target.value;
        }

        // 📝 [추가] 모달에서 이미지 주소를 직접 텍스트로 변경했을 때 데이터 및 썸네일 업데이트
        function handleImgUrlChange(event, index) {
            const newUrl = event.target.value;
            quizData[index].img = newUrl;
            document.getElementById(`preview-img-${index}`).src = newUrl;
        }

        // 개별 이미지 업로드 처리 함수 (PC 로컬 파일)
        function handleImageUpload(event, index) {
            const file = event.target.files[0];
            if (file) {
                // 선택한 로컬 파일을 임시 URL로 변환하여 적용
                const imageUrl = URL.createObjectURL(file);
                quizData[index].img = imageUrl;
                document.getElementById(`preview-img-${index}`).src = imageUrl;
                // 경로 입력창에도 임시 상태임을 표시
                document.getElementById(`img-url-${index}`).value = "[PC 임시 적용됨]";
            }
        }

        // 📝 [추가] 커스텀 모달 제어 함수
        function showCustomModal(msg, isConfirm, onOk, onCancel) {
            isPaused = true;
            document.getElementById('custom-modal-msg').innerText = msg;
            document.getElementById('custom-modal-overlay').style.display = 'flex';
            
            const btnCancel = document.getElementById('custom-btn-cancel');
            if (isConfirm) {
                btnCancel.style.display = 'block';
            } else {
                btnCancel.style.display = 'none';
            }

            modalOkCallback = onOk;
            modalCancelCallback = onCancel;
        }

        document.getElementById('custom-btn-ok').onclick = () => {
            document.getElementById('custom-modal-overlay').style.display = 'none';
            isPaused = false;
            if (modalOkCallback) modalOkCallback();
        };

        document.getElementById('custom-btn-cancel').onclick = () => {
            document.getElementById('custom-modal-overlay').style.display = 'none';
            isPaused = false;
            if (modalCancelCallback) modalCancelCallback();
        };

        // 모달 열기/닫기 토글 함수
        function toggleAllQuestions() {
            if (modal.style.display === "flex") {
                modal.style.display = "none";
            } else {
                modal.style.display = "flex";
            }
        }

        // 📝 [추가] 점수 집계판 열기/닫기 및 렌더링 함수
        function toggleScoreboard() {
            if (scoreboardModal.style.display === "flex") {
                scoreboardModal.style.display = "none";
            } else {
                renderScoreboard();
                scoreboardModal.style.display = "flex";
            }
        }

        function renderScoreboard() {
            scoreList.innerHTML = "";
            if (teamScores.length === 0) {
                scoreList.innerHTML = "<p style='text-align:center; font-size:2rem; color:#757575; padding: 40px;'>아직 기록된 점수가 없습니다.<br>퀴즈에 도전해 보세요!</p>";
                return;
            }
            
            // 점수가 높은 순으로 정렬 (내림차순)
            const sortedScores = [...teamScores].sort((a, b) => b.score - a.score);
            
            sortedScores.forEach((item, index) => {
                let rankIcon = `${index + 1}위`;
                if(index === 0) rankIcon = "🥇 1위";
                else if(index === 1) rankIcon = "🥈 2위";
                else if(index === 2) rankIcon = "🥉 3위";

                scoreList.innerHTML += `
                    <div class="score-item">
                        <span class="score-rank">${rankIcon}</span>
                        <span class="score-name">${item.team}</span>
                        <span class="score-points">${item.score}점</span>
                    </div>
                `;
            });
        }

        // 📝 [추가] 게임 초기화 함수 (새로고침 없이 시작 화면으로 복구)
        function resetToStartScreen() {
            currentIndex = -1;
            isProcessing = false;
            isPaused = false;
            
            setupArea.style.display = 'flex';
            startBtn.style.display = 'block';
            
            infoBar.style.display = 'none';
            btnO.style.display = 'none';
            btnX.style.display = 'none';
            btnStop.style.display = 'none';
            
            imgElement.style.display = 'none';
            stageText.style.display = 'none';
            answerText.style.visibility = 'hidden';
            oxOverlay.style.display = 'none';
            
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#4caf50';
            
            // 팀명 입력란 비우기 원하시면 활성화: teamNameInput.value = ""; 
        }

        // 오디오 요소
        const sndTick = document.getElementById('snd-tick');
        const sndDing = document.getElementById('snd-ding');

        // 배열 셔플(무작위 섞기) 함수
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 사운드 재생 함수 (중복 재생 방지 및 초기화)
        function playSound(audioEl) {
            audioEl.currentTime = 0; 
            audioEl.play().catch(e => console.log("사운드 재생 실패:", e));
        }

        function stopSound(audioEl) {
            audioEl.pause();
            audioEl.currentTime = 0;
        }

        function startQuiz() {
            // 팀명 확인 (입력 안 했으면 '도전자'로 기본값 설정)
            currentTeamName = teamNameInput.value.trim() || "도전자";
            infoTeam.innerText = `팀: ${currentTeamName}`;
            
            score = 0;
            infoScore.innerText = `점수: 0`;

            // 입력한 문제 개수 읽기 및 검증
            let count = parseInt(questionCountInput.value, 10);
            if (isNaN(count) || count < 1) count = 1;
            if (count > quizData.length) count = quizData.length;

            // 전체 문제를 랜덤으로 섞은 뒤 원하는 개수만큼 잘라서 저장
            selectedQuizData = shuffleArray(quizData).slice(0, count);

            startBtn.style.display = 'none';
            setupArea.style.display = 'none'; // 설정 화면 숨김
            
            // 컨트롤 버튼 표시
            btnO.style.display = 'block';
            btnX.style.display = 'block';
            btnStop.style.display = 'block';
            infoBar.style.display = 'flex';
            
            answerBtn.disabled = false;
            nextSlide();
        }

        function nextSlide() {
            isProcessing = false;
            oxOverlay.style.display = 'none'; // O/X 오버레이 숨김
            
            // 기존 타이머 및 사운드 초기화
            clearInterval(timerInterval);
            stopSound(sndTick);
            
            currentIndex++;
            
            if (currentIndex >= selectedQuizData.length) {
                endQuiz(true); // 정상 종료
                return;
            }

            // 단계별 타이틀 및 현재 진행률 적용 (예: 1 / 10)
            stageText.style.display = 'block';
            stageText.innerText = `${selectedQuizData[currentIndex].stage} (${currentIndex + 1} / ${selectedQuizData.length})`;

            imgElement.style.display = 'block';
            imgElement.src = selectedQuizData[currentIndex].img;
            answerText.style.visibility = 'hidden'; 
            answerText.innerText = selectedQuizData[currentIndex].answer;
            
            // 타이머바 초기화
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#4caf50';

            // 이미지 로드 시점 제어
            if (imgElement.complete) {
                startTimer(LIMIT_SEC);
            } else {
                imgElement.onload = function() {
                    startTimer(LIMIT_SEC);
                }
                imgElement.onerror = function() {
                    startTimer(LIMIT_SEC); // 이미지 오류 시에도 진행되도록 방어 로직 추가
                }
            }
        }

        function startTimer(seconds) {
            let timeLeft = seconds * 100; // 0.01초 단위
            
            playSound(sndTick);

            clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeLeft--;
                let percentage = (timeLeft / (seconds * 100)) * 100;
                timerBar.style.width = percentage + '%';

                if (percentage < 40) {
                    timerBar.style.backgroundColor = '#d32f2f'; // 40% 미만 빨간색 경고
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    stopSound(sndTick);
                    showAnswer(true);
                }
            }, 10);
        }

        function markAnswer(isCorrect) {
            if (isProcessing) return; // 중복 클릭 방지
            isProcessing = true;
            
            clearInterval(timerInterval);
            stopSound(sndTick);
            
            // 정답 시 사운드 및 점수 증가
            if (isCorrect) {
                playSound(sndDing);
                score++;
                infoScore.innerText = `점수: ${score}`;
                oxOverlay.innerText = "O";
                oxOverlay.className = "ox-o";
            } else {
                oxOverlay.innerText = "X";
                oxOverlay.className = "ox-x";
            }
            
            oxOverlay.style.display = 'block';
            answerText.style.visibility = 'visible';
            timerBar.style.width = '0%';
            
            // 0.8초 후 다음 문제로 자동 이동
            setTimeout(() => {
                nextSlide();
            }, 800);
        }

        function stopQuiz() {
            if (isProcessing || currentIndex < 0) return;

            clearInterval(timerInterval);
            stopSound(sndTick);
            
            // 기존 confirm() 대신 커스텀 모달 사용
            showCustomModal("정말 퀴즈를 그만하시겠습니까?", true, 
                () => {
                    endQuiz(false); // 중간 종료
                },
                () => {
                    startTimer(LIMIT_SEC); // 취소 시 타이머 재시작
                }
            );
        }

        function endQuiz(isCompleted) {
            clearInterval(timerInterval);
            stopSound(sndTick);
            
            // 💡 퀴즈 종료 시 점수를 기록 배열에 추가
            teamScores.push({ team: currentTeamName, score: score });
            
            let msg = isCompleted ? "퀴즈가 모두 끝났습니다! 🎉\n\n" : "퀴즈가 중간에 종료되었습니다. 🛑\n\n";
            msg += `[ ${currentTeamName} ] 팀의 최종 점수: ${score}점\n(총 ${selectedQuizData.length}문제 중)`;
            
            // 기존 alert() 대신 커스텀 모달 사용
            showCustomModal(msg, false, () => {
                resetToStartScreen(); // 새로고침(location.reload) 대신 화면 초기화 적용
                toggleScoreboard();   // 안내창 닫히면 바로 점수 집계판 띄우기
            });
        }

        function showAnswer(isTimeout = false) {
            if(answerText.style.visibility === 'visible' || isProcessing) return;

            clearInterval(timerInterval);
            stopSound(sndTick);

            playSound(sndDing);

            answerText.style.visibility = 'visible';
            timerBar.style.width = '0%';
        }

        // 키보드 조작
        document.addEventListener('keydown', (event) => {
            // 💡 모달창이 떠있거나 일시정지 상태면 키보드 동작 방지
            if (isPaused) return;
            if (modal.style.display === 'flex') return;
            if (scoreboardModal.style.display === 'flex') return;

            // 💡 입력창(input)에서 텍스트 타이핑 중일 때는 퀴즈 단축키 작동 방지
            if (event.target.tagName === 'INPUT') return;

            // 💡 시작 전: 스페이스바나 엔터를 누르면 시작
            if (currentIndex === -1) {
                if(event.code === 'Space' || event.code === 'Enter') {
                    event.preventDefault();
                    startQuiz();
                }
                return;
            }

            // 퀴즈 진행 중 단축키 제어
            if (currentIndex >= 0 && !isProcessing) {
                if (event.code === 'ArrowLeft') {
                    event.preventDefault();
                    markAnswer(true); // O 버튼 (왼쪽 방향키)
                } else if (event.code === 'ArrowRight') {
                    event.preventDefault();
                    markAnswer(false); // X 버튼 (오른쪽 방향키)
                } else if (event.code === 'Escape') {
                    stopQuiz(); // 그만하기 (ESC)
                } else if (event.code === 'Space' && !answerBtn.disabled) {
                    // 💡 Space 바를 누르면 정답 확인!
                    event.preventDefault();
                    showAnswer();
                } else if (event.code === 'Enter') {
                    // 💡 Enter 키를 누르면 패스 (오답 처리 후 빠르게 다음 문제로)
                    event.preventDefault();
                    markAnswer(false);
                }
            }
        });
    </script>
</body>
</html>
